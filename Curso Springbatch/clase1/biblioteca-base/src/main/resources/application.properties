spring.application.name=biblioteca-base-springbatch-clase1
server.port=8080

# H2 en memoria (pagina 33)
spring.datasource.url=jdbc:h2:mem:biblioteca_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html

# Lamina 12: URL base para ejemplo de consumo REST entre servicios
catalogo.libros.base-url=http://localhost:8080
